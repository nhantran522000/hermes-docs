name: Sync Hermes docs

# Crawls every page listed in the checked-in llms.txt into docs/, and commits +
# pushes any changes — all on GitHub's runners, so it runs whether or not your own
# machine is on. llms.txt is a hand-maintained page list; it is no longer fetched.

on:
  schedule:
    # 18:00 UTC every Sunday. GitHub cron is always UTC (no DST), so in the UK
    # this is 18:00 GMT in winter / 19:00 BST in summer. Adjust the numbers to
    # taste — format is: minute hour day-of-month month day-of-week (0 = Sunday).
    - cron: '0 18 * * 0'
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab / gh CLI

# Allow the built-in token to push commits back to the repo.
permissions:
  contents: write

# Never let two syncs run at once.
concurrency:
  group: sync-docs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install pandoc (pinned)
        # Pin the exact version so CI output byte-matches local crawls. Ubuntu's apt
        # pandoc is older and renders code fences/tables differently, which would fight
        # local runs on every sync. Keep this in step with your local pandoc version.
        env:
          PANDOC_VERSION: '3.9'
        run: |
          curl -fsSL -o /tmp/pandoc.deb \
            "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Crawl docs
        id: crawl
        continue-on-error: true   # a few failed pages shouldn't discard the rest
        run: python3 scripts/crawl_docs.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- docs
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
            exit 0
          fi
          git commit -m "docs: sync Hermes docs $(date -u +'%Y-%m-%d %H:%M UTC')" \
                     -m "Automated via GitHub Actions: re-crawled all pages from the checked-in llms.txt."
          git push
          echo "Pushed documentation updates."

      - name: Fail the run if the crawl had errors
        if: steps.crawl.outcome == 'failure'
        run: |
          echo "::error::The crawl step reported failures — see the 'Crawl docs' step log."
          exit 1
